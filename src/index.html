<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <script>
    // Suppress Google Translate / external extension script errors to prevent Vite/Bun runtime overlay in development
    window.addEventListener('error', function (e) {
      if (e.message && (
        e.message.includes('Script error.') ||
        e.message.includes('Translate') ||
        e.message.includes('reading \'L\'') ||
        e.message.includes('Cannot read properties of undefined') ||
        (e.filename && e.filename.includes('translate'))
      )) {
        e.stopImmediatePropagation();
        e.preventDefault();
      }
    }, true);

    window.addEventListener('unhandledrejection', function (e) {
      if (e.reason && (
        String(e.reason).includes('Translate') ||
        String(e.reason).includes('reading \'L\'') ||
        String(e.reason).includes('Error: he') ||
        String(e.reason).includes('Cannot read properties of undefined')
      )) {
        e.stopImmediatePropagation();
        e.preventDefault();
      }
    }, true);
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="./assets/favicons/favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/favicons/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="48x48" href="./assets/favicons/favicon-48.png" />
  <link rel="icon" type="image/png" sizes="180x180" href="./assets/favicons/favicon-180.png" />
