<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <script>
    // Suppress Google Translate / external extension script errors to prevent Vite/Bun runtime overlay in development
    window.addEventListener('error', function(e) {
      if (e.message && (
        e.message.includes('Script error.') || 
        e.message.includes('Translate') || 
        e.message.includes('reading \'L\'') ||
        e.message.includes('Cannot read properties of undefined') ||
        (e.filename && e.filename.includes('translate'))
      )) {
        e.stopImmediatePropagation();
        e.preventDefault();
      }
    }, true);

    window.addEventListener('unhandledrejection', function(e) {
      if (e.reason && (
        String(e.reason).includes('Translate') || 
        String(e.reason).includes('reading \'L\'') ||
        String(e.reason).includes('Error: he') ||
        String(e.reason).includes('Cannot read properties of undefined')
      )) {
        e.stopImmediatePropagation();
        e.preventDefault();
      }
    }, true);
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="https://imgh.in/host/rse68k" />
  <title>Infou Consultancy Services</title>
  <meta name="description"
    content="Infou Consultancy provides precision-engineered compliance and allocation frameworks to unlock institutional capital across state and central government schemes for Indian businesses." />

  <!-- Open Graph Metadata -->
  <meta property="og:title" content="Infou Consultancy | Sovereign Government Funding Strategy" />
  <meta property="og:description"
    content="Precision-engineered compliance and allocation frameworks designed to unlock institutional capital across state and central schemes for Indian businesses." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://infouconsultancy.com" />
  <meta property="og:image" content="./logo.svg" />

  <!-- Resource Preconnection Hints -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://images.unsplash.com" />
  <link rel="preload"
    href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@300;400;500;600;700;800&display=swap" as="style"
    onload="this.onload=null;this.rel='stylesheet'" />
  <noscript>
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet" />
  </noscript>

  <!-- Structured Organization Schema -->
  <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "GovernmentService",
        "name": "Infou Consultancy Sovereign Government Funding Strategy",
        "description": "Precision-engineered compliance and allocation frameworks designed to unlock institutional capital across state and central schemes in India.",
        "provider": {
          "@type": "ConsultingBusiness",
          "name": "Infou Consultancy",
          "url": "https://infouconsultancy.com"
        },
        "areaServed": "IN"
      }
    </script>

  <script type="module" src="./frontend.tsx" async></script>
</head>

<body>
  <div id="root" class="w-full">
    <!-- Static Hero Pre-render for instant FCP/LCP -->
    <div class="w-full min-h-screen flex items-center justify-center relative bg-white overflow-hidden">
      <!-- Tactile Dotted Grid Paper Texture Overlay -->
      <div class="absolute inset-0 pointer-events-none opacity-45 z-0"
        style="background-image: radial-gradient(oklch(0.55 0.03 38) 1px, transparent 1px); background-size: 24px 24px;">
      </div>
      <!-- Bottom fade out transition -->
      <div
        class="absolute bottom-0 left-0 right-0 h-32 bg-gradient-to-t from-white to-transparent pointer-events-none z-0">
      </div>

      <div class="relative max-w-7xl mx-auto px-6 pt-24 pb-16 z-10 w-full">
        <div class="grid grid-cols-2 lg:grid-cols-12 gap-8 items-center">
          <!-- Left Column: Notion-style floating illustration 1 placeholder -->
          <div class="col-span-1 lg:col-span-3 order-2 lg:order-1 flex justify-center items-center">
            <div
              class="w-full max-w-[160px] lg:max-w-none aspect-[205/139] bg-zinc-50 border border-zinc-100 rounded-2xl opacity-70 animate-pulse">
            </div>
          </div>

          <!-- Center Column Content -->
          <div
            class="col-span-2 lg:col-span-6 order-1 lg:order-2 text-center flex flex-col items-center justify-center">
            <span
              class="font-sans text-base sm:text-lg font-extrabold tracking-[0.25em] uppercase text-primary mb-4 block select-none">
              Introducing
            </span>
            <h1
              class="text-4xl sm:text-5xl md:text-6xl font-extrabold tracking-tight text-zinc-900 leading-[1.1] text-center">
              AI Search Engine for <span class="text-primary">Businesses</span>
            </h1>
            <p class="mt-6 text-lg text-zinc-500 leading-relaxed text-center max-w-xl mx-auto">
              Precision-engineered compliance and allocation frameworks designed to unlock institutional capital across
              state and central schemes in India.
            </p>
            <div class="mt-10 flex justify-center">
              <div class="bg-foreground/10 rounded-[14px] border border-zinc-200/50 p-0.5">
                <div class="rounded-xl px-6 py-4 text-xs font-bold tracking-widest uppercase bg-black text-white">
                  Launch Eligibility Diagnostic
                </div>
              </div>
            </div>
          </div>

          <!-- Right Column: Notion-style floating illustration 3 placeholder -->
          <div class="col-span-1 lg:col-span-3 order-3 lg:order-3 flex justify-center items-center">
            <div
              class="w-full max-w-[160px] lg:max-w-none aspect-[205/139] bg-zinc-50 border border-zinc-100 rounded-2xl opacity-70 animate-pulse">
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div id="google_translate_element" style="display:none"></div>
</body>

</html>
